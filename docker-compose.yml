version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnes-marketplace-web
    ports:
      - "8080:80"
    volumes:
      - ./Marketplace:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_NAME=omnes_marketplace
      - DB_USER=root
      - DB_PASS=root_password
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - MAIL_FROM=no-reply@marketplace.local
    networks:
      - omnes-network

  db:
    image: mysql:8.0
    container_name: omnes-marketplace-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: omnes_marketplace
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
      - ./Maquette/create_database.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omnes-network

  mailhog:
    image: mailhog/mailhog
    container_name: omnes-marketplace-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - omnes-network

  phpmyadmin:
    image: phpmyadmin:5
    container_name: omnes-marketplace-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - omnes-network

volumes:
  db_data:

networks:
  omnes-network:
    driver: bridge
